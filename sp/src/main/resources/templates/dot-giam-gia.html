<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đợt giảm giá</title>
    <script src="/js/app-shell.js" defer></script>
    <style>
        *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#f3f4f6;color:#172033}.page{min-height:100vh;padding:22px}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:14px}.title h1{font-size:22px;margin:0 0 4px;font-weight:800}.title p{margin:0;color:#6b7280;font-size:13px}.toolbar{display:flex;gap:8px}.btn{height:36px;border:1px solid #dde3ea;border-radius:8px;background:#fff;color:#172033;font-weight:700;font-size:13px;padding:0 13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;text-decoration:none}.btn:hover{background:#f8fafc}.btn.primary{background:#c8a474;border-color:#c8a474;color:#fff}.btn.danger{color:#dc2626}.btn.icon{width:34px;padding:0;justify-content:center}.panel{background:#fff;border:1px solid #dde3ea;border-radius:8px;overflow:hidden}.filters{display:grid;grid-template-columns:minmax(260px,1fr) 160px 190px 190px auto;gap:12px;padding:16px;border-bottom:1px solid #e5e7eb;align-items:end}.field label{display:block;font-size:12px;color:#64748b;font-weight:800;margin-bottom:6px;text-transform:uppercase}.field input,.field select{width:100%;height:38px;border:1px solid #d8dee8;border-radius:8px;padding:0 11px;font-size:14px;background:#fff}.field input:focus,.field select:focus{outline:2px solid rgba(200,164,116,.25);border-color:#c8a474}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:980px}th{height:44px;background:#f8fafc;border-bottom:1px solid #e5e7eb;color:#64748b;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.02em;padding:0 14px}td{height:50px;border-bottom:1px solid #edf0f4;padding:0 14px;font-size:14px;vertical-align:middle}tr:hover td{background:#fcfcfd}.code{display:inline-flex;background:#f1f5f9;border-radius:5px;padding:3px 7px;font-size:12px;font-weight:800;color:#334155}.badge{display:inline-flex;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800}.badge.on{background:#dcfce7;color:#16a34a}.badge.off{background:#fee2e2;color:#dc2626}.badge.wait{background:#fef3c7;color:#b45309}.badge.done{background:#e5e7eb;color:#475569}.actions{display:flex;align-items:center;gap:7px}.switch{position:relative;display:inline-flex;width:40px;height:22px}.switch input{display:none}.switch span{position:absolute;inset:0;background:#cbd5e1;border-radius:999px;cursor:pointer;transition:.15s}.switch span:before{content:"";position:absolute;width:18px;height:18px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.15s}.switch input:checked+span{background:#16a34a}.switch input:checked+span:before{transform:translateX(18px)}.empty{padding:42px 18px;text-align:center;color:#64748b}.pager{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;color:#64748b;font-size:13px}.pager-actions{display:flex;gap:8px}.modal{position:fixed;inset:0;background:rgba(15,23,42,.48);z-index:1000;display:flex;align-items:center;justify-content:center;padding:18px}.modal[hidden]{display:none}.modal-box{width:min(920px,100%);background:#fff;border-radius:8px;box-shadow:0 20px 60px rgba(15,23,42,.22);overflow:hidden}.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #e5e7eb}.modal-head h2{font-size:18px;margin:0}.modal-body{padding:18px 20px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;max-height:72vh;overflow:auto}.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid #e5e7eb}.full{grid-column:1/-1}.pick-list{border:1px solid #d8dee8;border-radius:8px;overflow:hidden}.pick-search{padding:10px;border-bottom:1px solid #e5e7eb}.pick-search input{width:100%;height:36px}.pick-rows{max-height:260px;overflow:auto}.pick-row{display:grid;grid-template-columns:34px 1fr 120px 90px;gap:8px;align-items:center;padding:9px 12px;border-bottom:1px solid #eef2f7;font-size:13px}.pick-row:hover{background:#f8fafc}.toast{position:fixed;right:18px;bottom:18px;z-index:1200;background:#172033;color:#fff;padding:12px 14px;border-radius:8px;font-size:13px;max-width:380px;box-shadow:0 12px 30px rgba(15,23,42,.24)}.toast.error{background:#b91c1c}.toast.success{background:#15803d}@media(max-width:980px){.filters,.modal-body{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.pick-row{grid-template-columns:34px 1fr}.pick-row span:nth-child(n+3){display:none}.page{padding:16px}}
    </style>
</head>
<body>
<aside class="sidebar"></aside>
<main class="main page">
    <div class="topbar">
        <div class="title">
            <h1>Đợt giảm giá</h1>
            <p id="summary"></p>
        </div>
        <div class="toolbar">
            <button class="btn" id="resetBtn">↺ Đặt lại</button>
            <button class="btn primary" id="addBtn">＋ Thêm</button>
        </div>
    </div>

    <section class="panel">
        <form class="filters" id="filterForm">
            <div class="field"><label>Tìm kiếm</label><input name="keyword" placeholder="Mã hoặc tên đợt"></div>
            <div class="field"><label>Trạng thái</label><select name="trangThai"><option value="">Tất cả</option><option value="true">Hoạt động</option><option value="false">Ngừng</option></select></div>
            <div class="field"><label>Từ ngày</label><input name="tuNgay" type="datetime-local"></div>
            <div class="field"><label>Đến ngày</label><input name="denNgay" type="datetime-local"></div>
            <button class="btn" type="submit">🔎 Lọc</button>
        </form>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>STT</th><th>Mã</th><th>Tên đợt</th><th>Giá trị</th><th>Thời gian</th><th>Tiến độ</th><th>Trạng thái</th><th>Bật/tắt</th><th>Hành động</th>
                </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
            <div class="empty" id="empty" hidden>Không có đợt giảm giá</div>
        </div>
        <div class="pager">
            <span id="pageInfo">Trang 1/1</span>
            <div class="pager-actions">
                <button class="btn" id="prevBtn" type="button">‹ Trước</button>
                <button class="btn" id="nextBtn" type="button">Sau ›</button>
            </div>
        </div>
    </section>
</main>

<div class="modal" id="promotionModal" hidden>
    <form class="modal-box" id="promotionForm">
        <div class="modal-head">
            <h2 id="modalTitle">Thêm đợt giảm giá</h2>
            <button class="btn icon" type="button" id="closeModal">×</button>
        </div>
        <div class="modal-body">
            <input type="hidden" name="id">
            <div class="field"><label>Mã đợt</label><input name="maDotGiamGia" placeholder="Tự tạo nếu để trống"></div>
            <div class="field"><label>Tên đợt</label><input name="tenDotGiamGia" required></div>
            <div class="field"><label>Loại giảm</label><select name="loaiGiamGia"><option value="PHAN_TRAM">Phần trăm</option>
<!--                 -->
            </select></div>
            <div class="field"><label>Giá trị giảm</label><input name="giaTriGiamGia" type="number" min="0" step="1000" required></div>
            <div class="field"><label>Số tiền tối đa</label><input name="soTienToiDa" type="number" min="0" step="1000"></div>
            <div class="field"><label>Trạng thái</label><select name="trangThai"><option value="true">Hoạt động</option><option value="false">Ngừng</option></select></div>
            <div class="field"><label>Ngày bắt đầu</label><input name="ngayBatDau" type="datetime-local" required></div>
            <div class="field"><label>Ngày kết thúc</label><input name="ngayKetThuc" type="datetime-local" required></div>
            <div class="field full">
                <label>Sản phẩm chi tiết áp dụng</label>
                <div class="pick-list">
                    <div class="pick-search"><input id="spctSearch" type="search" placeholder="Tìm mã SKU hoặc tên sản phẩm"></div>
                    <div class="pick-rows" id="spctRows"></div>
                </div>
            </div>
        </div>
        <div class="modal-foot">
            <button class="btn" type="button" id="cancelBtn">Hủy</button>
            <button class="btn primary" type="submit">💾 Lưu</button>
        </div>
    </form>
</div>

<script>
    const API = '/api/dot-giam-gia';
    const state = {page: 0, size: 20, totalPages: 1, totalElements: 0, items: [], spcts: [], selectedSpctIds: new Set()};
    const $ = (id) => document.getElementById(id);
    const filterForm = $('filterForm');
    const form = $('promotionForm');

    document.addEventListener('DOMContentLoaded', () => {
        $('addBtn').addEventListener('click', () => openModal());
        $('resetBtn').addEventListener('click', () => { filterForm.reset(); loadData(0); });
        $('closeModal').addEventListener('click', closeModal);
        $('cancelBtn').addEventListener('click', closeModal);
        $('promotionModal').addEventListener('click', e => { if (e.target.id === 'promotionModal') closeModal(); });
        filterForm.addEventListener('submit', e => { e.preventDefault(); loadData(0); });
        form.addEventListener('submit', savePromotion);
        $('prevBtn').addEventListener('click', () => loadData(Math.max(0, state.page - 1)));
        $('nextBtn').addEventListener('click', () => loadData(Math.min(state.totalPages - 1, state.page + 1)));
        $('spctSearch').addEventListener('input', renderSpctRows);
        loadSpct();
        loadData();
    });

    async function loadData(page = 0) {
        state.page = page;
        const response = await fetch(`${API}?${currentParams(true)}`);
        if (!response.ok) return toast(await readError(response), true);
        const data = await response.json();
        state.items = data.content || [];
        state.totalPages = data.totalPages || 1;
        state.totalElements = data.totalElements || 0;
        render();
    }

    async function loadSpct() {
        const response = await fetch(`${API}/san-pham-chi-tiet`);
        if (!response.ok) return;
        state.spcts = await response.json();
        renderSpctRows();
    }

    function currentParams(includePaging) {
        const data = new FormData(filterForm);
        const params = new URLSearchParams();
        ['keyword','trangThai','tuNgay','denNgay'].forEach(key => {
            const value = (data.get(key) || '').trim();
            if (value) params.set(key, value);
        });
        if (includePaging) {
            params.set('page', state.page);
            params.set('size', state.size);
        }
        return params;
    }

    function render() {
        $('summary').textContent = `${state.totalElements} đợt`;
        $('pageInfo').textContent = `Trang ${state.page + 1}/${state.totalPages}`;
        $('prevBtn').disabled = state.page <= 0;
        $('nextBtn').disabled = state.page >= state.totalPages - 1;
        $('empty').hidden = state.items.length > 0;
        $('rows').innerHTML = state.items.map((item, index) => {
            const progress = progressLabel(item);
            return `
            <tr>
                <td>${state.page * state.size + index + 1}</td>
                <td><span class="code">${esc(item.maDotGiamGia)}</span></td>
                <td>${esc(item.tenDotGiamGia)}</td>
                <td>${formatDiscount(item)}</td>
                <td>${dateTime(item.ngayBatDau)}<br>${dateTime(item.ngayKetThuc)}</td>
                <td><span class="badge ${progress.cls}">${progress.text}</span></td>
                <td><span class="badge ${item.trangThai ? 'on' : 'off'}">${item.trangThai ? 'Hoạt động' : 'Ngừng'}</span></td>
                <td><label class="switch"><input type="checkbox" ${item.trangThai ? 'checked' : ''} onchange="toggleStatus(${item.id})"><span></span></label></td>
                <td><div class="actions"><button class="btn icon" onclick="openModal(${item.id})">✎</button><button class="btn icon danger" onclick="deletePromotion(${item.id})">🗑</button></div></td>
            </tr>`;
        }).join('');
    }

    async function openModal(id) {
        form.reset();
        state.selectedSpctIds = new Set();
        $('modalTitle').textContent = id ? 'Cập nhật đợt giảm giá' : 'Thêm đợt giảm giá';
        if (id) {
            const item = state.items.find(v => v.id === id) || await (await fetch(`${API}/${id}`)).json();
            Object.entries(item).forEach(([key, value]) => {
                if (form.elements[key]) form.elements[key].value = value ?? '';
            });
            form.elements.ngayBatDau.value = toInputDateTime(item.ngayBatDau);
            form.elements.ngayKetThuc.value = toInputDateTime(item.ngayKetThuc);
            form.elements.trangThai.value = String(Boolean(item.trangThai));
            const ids = await (await fetch(`${API}/${id}/san-pham-chi-tiet-ids`)).json();
            state.selectedSpctIds = new Set(ids.map(Number));
        } else {
            form.elements.loaiGiamGia.value = 'PHAN_TRAM';
            form.elements.trangThai.value = 'true';
        }
        $('spctSearch').value = '';
        renderSpctRows();
        $('promotionModal').hidden = false;
    }

    function renderSpctRows() {
        const keyword = $('spctSearch').value.trim().toLowerCase();
        const list = state.spcts.filter(sp => !keyword || String(sp.maSpct || '').toLowerCase().includes(keyword) || String(sp.tenSp || '').toLowerCase().includes(keyword));
        $('spctRows').innerHTML = list.map(sp => `
            <label class="pick-row">
                <input type="checkbox" value="${sp.idSpct}" ${state.selectedSpctIds.has(Number(sp.idSpct)) ? 'checked' : ''} onchange="toggleSpct(${sp.idSpct}, this.checked)">
                <span><b>${esc(sp.maSpct)}</b><br>${esc(sp.tenSp)}</span>
                <span>${money(sp.giaBan)}</span>
                <span>Tồn: ${sp.soLuongTon ?? 0}</span>
            </label>
        `).join('');
    }

    function toggleSpct(id, checked) {
        checked ? state.selectedSpctIds.add(Number(id)) : state.selectedSpctIds.delete(Number(id));
    }

    function closeModal() {
        $('promotionModal').hidden = true;
    }

    async function savePromotion(event) {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(form).entries());
        const id = data.id;
        delete data.id;
        ['giaTriGiamGia','soTienToiDa'].forEach(key => data[key] = data[key] ? Number(data[key]) : null);
        data.trangThai = data.trangThai === 'true';
        data.selectedSpctIds = [...state.selectedSpctIds];
        Object.keys(data).forEach(key => { if (data[key] === '') data[key] = null; });
        const response = await fetch(id ? `${API}/${id}` : API, {
            method: id ? 'PUT' : 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if (!response.ok) return toast(await readError(response), true);
        closeModal();
        toast('Đã lưu đợt giảm giá');
        await loadData(state.page);
    }

    async function toggleStatus(id) {
        const response = await fetch(`${API}/${id}/trang-thai`, {method: 'PATCH'});
        if (!response.ok) return toast(await readError(response), true);
        await loadData(state.page);
    }

    async function deletePromotion(id) {
        if (!confirm('Xóa đợt giảm giá này?')) return;
        const response = await fetch(`${API}/${id}`, {method: 'DELETE'});
        if (!response.ok) return toast(await readError(response), true);
        toast('Đã ngừng đợt giảm giá');
        await loadData(state.page);
    }

    function progressLabel(item) {
        if (!item.trangThai) return {text:'Đã hủy/xóa', cls:'off'};
        const now = new Date();
        const start = item.ngayBatDau ? new Date(item.ngayBatDau) : null;
        const end = item.ngayKetThuc ? new Date(item.ngayKetThuc) : null;
        if (start && now < start) return {text:'Sắp diễn ra', cls:'wait'};
        if (end && now > end) return {text:'Đã kết thúc', cls:'done'};
        return {text:'Đang diễn ra', cls:'on'};
    }
    function formatDiscount(item) { return item.loaiGiamGia === 'TIEN_MAT' ? money(item.giaTriGiamGia) : `${item.giaTriGiamGia ?? 0}%`; }
    function money(value) { return value == null ? '' : Number(value).toLocaleString('vi-VN') + ' đ'; }
    function dateTime(value) { return value ? value.replace('T', ' ').substring(0, 16) : ''; }
    function toInputDateTime(value) { return value ? value.substring(0, 16) : ''; }
    async function readError(response) { const text = await response.text(); try { return JSON.parse(text).message || text; } catch { return text || 'Có lỗi xảy ra'; } }
    function toast(message, error = false) { const el = document.createElement('div'); el.className = `toast ${error ? 'error' : 'success'}`; el.textContent = message; document.body.appendChild(el); setTimeout(() => el.remove(), 3500); }
    function esc(value) { return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
</script>
</body>
</html>
