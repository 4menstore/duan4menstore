<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý khách hàng</title>
    <script src="/js/app-shell.js" defer></script>
    <style>
        *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#f3f4f6;color:#172033}.page{min-height:100vh;padding:22px}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:14px}.title h1{font-size:22px;margin:0 0 4px;font-weight:800}.title p{margin:0;color:#6b7280;font-size:13px}.toolbar{display:flex;gap:8px;align-items:center}.btn{height:36px;border:1px solid #dde3ea;border-radius:8px;background:#fff;color:#172033;font-weight:700;font-size:13px;padding:0 13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;text-decoration:none}.btn:hover{background:#f8fafc}.btn.primary{background:#c8a474;border-color:#c8a474;color:#fff}.btn.danger{color:#dc2626}.btn.icon{width:34px;padding:0;justify-content:center}.panel{background:#fff;border:1px solid #dde3ea;border-radius:8px;overflow:hidden}.filters{display:grid;grid-template-columns:minmax(260px,1fr) 190px auto;gap:12px;padding:16px;border-bottom:1px solid #e5e7eb;align-items:end}.field label{display:block;font-size:12px;color:#64748b;font-weight:800;margin-bottom:6px;text-transform:uppercase}.field input,.field select{width:100%;height:38px;border:1px solid #d8dee8;border-radius:8px;padding:0 11px;font-size:14px;background:#fff}.field input:focus,.field select:focus{outline:2px solid rgba(200,164,116,.25);border-color:#c8a474}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:980px}th{height:44px;background:#f8fafc;border-bottom:1px solid #e5e7eb;color:#64748b;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.02em;padding:0 14px}td{height:50px;border-bottom:1px solid #edf0f4;padding:0 14px;font-size:14px;vertical-align:middle}tr:hover td{background:#fcfcfd}.code{display:inline-flex;background:#f1f5f9;border-radius:5px;padding:3px 7px;font-size:12px;font-weight:800;color:#334155}.badge{display:inline-flex;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800}.badge.on{background:#dcfce7;color:#16a34a}.badge.off{background:#fee2e2;color:#dc2626}.actions{display:flex;align-items:center;gap:7px}.switch{position:relative;display:inline-flex;width:40px;height:22px}.switch input{display:none}.switch span{position:absolute;inset:0;background:#cbd5e1;border-radius:999px;cursor:pointer;transition:.15s}.switch span:before{content:"";position:absolute;width:18px;height:18px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.15s}.switch input:checked+span{background:#16a34a}.switch input:checked+span:before{transform:translateX(18px)}.empty{padding:42px 18px;text-align:center;color:#64748b}.pager{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;color:#64748b;font-size:13px}.pager-actions{display:flex;gap:8px}.modal{position:fixed;inset:0;background:rgba(15,23,42,.48);z-index:1000;display:flex;align-items:center;justify-content:center;padding:18px}.modal[hidden]{display:none}.modal-box{width:min(760px,100%);background:#fff;border-radius:8px;box-shadow:0 20px 60px rgba(15,23,42,.22);overflow:hidden}.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #e5e7eb}.modal-head h2{font-size:18px;margin:0}.modal-body{padding:18px 20px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid #e5e7eb}.full{grid-column:1/-1}.toast{position:fixed;right:18px;bottom:18px;z-index:1200;background:#172033;color:#fff;padding:12px 14px;border-radius:8px;font-size:13px;max-width:360px;box-shadow:0 12px 30px rgba(15,23,42,.24)}.toast.error{background:#b91c1c}.toast.success{background:#15803d}@media(max-width:900px){.filters{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}.modal-body{grid-template-columns:1fr}.page{padding:16px}}
    </style>
</head>
<body>
<aside class="sidebar"></aside>
<main class="main page">
    <div class="topbar">
        <div class="title">
            <h1>Quản lý khách hàng</h1>
            <p id="summary">0 khách hàng</p>
        </div>
        <div class="toolbar">
            <button class="btn" id="exportBtn">⬇ Tải Excel</button>
            <button class="btn primary" id="addBtn">＋ Thêm</button>
        </div>
    </div>

    <section class="panel">
        <form class="filters" id="filterForm">
            <div class="field">
                <label>Tìm kiếm</label>
                <input name="keyword" placeholder="Mã, tên, email, số điện thoại">
            </div>
            <div class="field">
                <label>Trạng thái</label>
                <select name="trangThai">
                    <option value="">Tất cả</option>
                    <option value="true">Hoạt động</option>
                    <option value="false">Ngừng hoạt động</option>
                </select>
            </div>
            <button class="btn" type="submit">🔎 Lọc</button>
        </form>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>STT</th>
                    <th>Mã KH</th>
                    <th>Tên khách hàng</th>
                    <th>Email</th>
                    <th>Số điện thoại</th>
                    <th>Địa chỉ</th>
                    <th>Giới tính</th>
                    <th>Ngày sinh</th>
                    <th>Trạng thái</th>
                    <th>Bật/tắt</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
            <div class="empty" id="empty" hidden>Không có khách hàng</div>
        </div>
        <div class="pager">
            <span id="pageInfo">Trang 1/1</span>
            <div class="pager-actions">
                <button class="btn" id="prevBtn" type="button">‹ Trước</button>
                <button class="btn" id="nextBtn" type="button">Sau ›</button>
            </div>
        </div>
    </section>
</main>

<div class="modal" id="customerModal" hidden>
    <form class="modal-box" id="customerForm">
        <div class="modal-head">
            <h2 id="modalTitle">Thêm khách hàng</h2>
            <button class="btn icon" type="button" id="closeModal">×</button>
        </div>
        <div class="modal-body">
            <input type="hidden" name="id">
            <div class="field"><label>Mã khách hàng</label><input name="maKh"></div>
            <div class="field"><label>Tên khách hàng</label><input name="tenKhachHang" required></div>
            <div class="field"><label>Email</label><input name="email" type="email"></div>
            <div class="field"><label>Số điện thoại</label><input name="soDienThoai"></div>
            <div class="field full"><label>Địa chỉ</label><input name="diaChi"></div>
            <div class="field"><label>Giới tính</label><select name="gioiTinh"><option value="">Chọn</option><option>Nam</option><option>Nữ</option><option>Khác</option></select></div>
            <div class="field"><label>Ngày sinh</label><input name="ngaySinh" type="date"></div>
            <div class="field"><label>Trạng thái</label><select name="trangThai"><option value="true">Hoạt động</option><option value="false">Ngừng hoạt động</option></select></div>
        </div>
        <div class="modal-foot">
            <button class="btn" type="button" id="cancelBtn">Hủy</button>
            <button class="btn primary" type="submit">💾 Lưu</button>
        </div>
    </form>
</div>

<script>
    const API = '/api/khach-hang';
    const state = {page: 0, size: 20, totalPages: 1, totalElements: 0, items: []};
    const $ = (id) => document.getElementById(id);
    const form = $('customerForm');
    const filterForm = $('filterForm');

    document.addEventListener('DOMContentLoaded', () => {
        $('addBtn').addEventListener('click', () => openModal());
        $('closeModal').addEventListener('click', closeModal);
        $('cancelBtn').addEventListener('click', closeModal);
        $('customerModal').addEventListener('click', (event) => { if (event.target.id === 'customerModal') closeModal(); });
        filterForm.addEventListener('submit', (event) => { event.preventDefault(); loadData(0); });
        form.addEventListener('submit', saveCustomer);
        $('prevBtn').addEventListener('click', () => loadData(Math.max(0, state.page - 1)));
        $('nextBtn').addEventListener('click', () => loadData(Math.min(state.totalPages - 1, state.page + 1)));
        $('exportBtn').addEventListener('click', exportExcel);
        loadData();
    });

    async function loadData(page = 0) {
        state.page = page;
        const params = currentParams(true);
        const response = await fetch(`${API}?${params}`);
        if (!response.ok) return toast(await readError(response), true);
        const data = await response.json();
        state.items = data.content || [];
        state.totalPages = data.totalPages || 1;
        state.totalElements = data.totalElements || 0;
        render();
    }

    function currentParams(includePaging) {
        const data = new FormData(filterForm);
        const params = new URLSearchParams();
        const keyword = (data.get('keyword') || '').trim();
        const trangThai = data.get('trangThai');
        if (keyword) params.set('keyword', keyword);
        if (trangThai) params.set('trangThai', trangThai);
        if (includePaging) {
            params.set('page', state.page);
            params.set('size', state.size);
        }
        return params;
    }

    function render() {
        $('summary').textContent = `${state.totalElements} khách hàng`;
        $('pageInfo').textContent = `Trang ${state.page + 1}/${state.totalPages}`;
        $('prevBtn').disabled = state.page <= 0;
        $('nextBtn').disabled = state.page >= state.totalPages - 1;
        $('empty').hidden = state.items.length > 0;
        $('rows').innerHTML = state.items.map((kh, index) => `
            <tr>
                <td>${state.page * state.size + index + 1}</td>
                <td><span class="code">${esc(kh.maKh)}</span></td>
                <td>${esc(kh.tenKhachHang)}</td>
                <td>${esc(kh.email)}</td>
                <td>${esc(kh.soDienThoai)}</td>
                <td>${esc(kh.diaChi)}</td>
                <td>${esc(kh.gioiTinh)}</td>
                <td>${formatDate(kh.ngaySinh)}</td>
                <td><span class="badge ${kh.trangThai ? 'on' : 'off'}">${kh.trangThai ? 'Hoạt động' : 'Ngừng'}</span></td>
                <td><label class="switch"><input type="checkbox" ${kh.trangThai ? 'checked' : ''} onchange="toggleStatus(${kh.id})"><span></span></label></td>
                <td><div class="actions"><button class="btn icon" onclick="openModal(${kh.id})">✎</button><button class="btn icon danger" onclick="deleteCustomer(${kh.id})">🗑</button></div></td>
            </tr>
        `).join('');
    }

    function openModal(id) {
        form.reset();
        $('modalTitle').textContent = id ? 'Cập nhật khách hàng' : 'Thêm khách hàng';
        if (id) {
            const kh = state.items.find(item => item.id === id);
            if (!kh) return;
            Object.entries(kh).forEach(([key, value]) => {
                if (form.elements[key]) form.elements[key].value = value ?? '';
            });
            form.elements.ngaySinh.value = toDateInput(kh.ngaySinh);
            form.elements.trangThai.value = String(Boolean(kh.trangThai));
        } else {
            form.elements.trangThai.value = 'true';
        }
        $('customerModal').hidden = false;
    }

    function closeModal() {
        $('customerModal').hidden = true;
    }

    async function saveCustomer(event) {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(form).entries());
        const id = data.id;
        delete data.id;
        data.trangThai = data.trangThai === 'true';
        if (!data.ngaySinh) data.ngaySinh = null;
        Object.keys(data).forEach(key => { if (data[key] === '') data[key] = null; });

        const response = await fetch(id ? `${API}/${id}` : API, {
            method: id ? 'PUT' : 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if (!response.ok) return toast(await readError(response), true);
        closeModal();
        toast('Đã lưu khách hàng');
        await loadData(state.page);
    }

    async function toggleStatus(id) {
        const response = await fetch(`${API}/${id}/trang-thai`, {method: 'PATCH'});
        if (!response.ok) return toast(await readError(response), true);
        await loadData(state.page);
    }

    async function deleteCustomer(id) {
        if (!confirm('Xóa khách hàng này?')) return;
        const response = await fetch(`${API}/${id}`, {method: 'DELETE'});
        if (!response.ok) return toast(await readError(response), true);
        toast('Đã xóa khách hàng');
        await loadData(state.page);
    }

    async function exportExcel() {
        const response = await fetch(`${API}/xuat-excel?${currentParams(false)}`);
        if (!response.ok) return toast(await readError(response), true);
        const blob = await response.blob();
        download(blob, 'danh_sach_khach_hang.xlsx');
    }

    function download(blob, filename) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
    }

    async function readError(response) {
        const text = await response.text();
        try { return JSON.parse(text).message || text; } catch { return text || 'Có lỗi xảy ra'; }
    }

    function toast(message, error = false) {
        const el = document.createElement('div');
        el.className = `toast ${error ? 'error' : 'success'}`;
        el.textContent = message;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }

    function formatDate(value) {
        if (!value) return '';
        const [y, m, d] = value.split('-');
        return d && m && y ? `${d}/${m}/${y}` : value;
    }

    function toDateInput(value) {
        return value ? value.substring(0, 10) : '';
    }

    function esc(value) {
        return String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));
    }
</script>
</body>
</html>
